services:
  - type: web
    name: datachat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker src.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datachat-db
          property: connectionString

databases:
  - name: datachat-db
    databaseName: datachat
    user: datachat_user
